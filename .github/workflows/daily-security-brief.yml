name: Daily Security Brief

on:
  schedule:
    - cron: "7 7 * * *"
      timezone: "Europe/Oslo"

  workflow_dispatch:
    inputs:
      lookback_hours:
        description: Use auto, 36 or 72
        required: true
        default: "auto"
        type: string
      kev_lookback_days:
        description: Use auto or a number of calendar days
        required: true
        default: "auto"
        type: string
      max_items:
        description: Maximum number of primary security advisories
        required: true
        default: "40"
        type: string
      discovery_max:
        description: Maximum number of discovery-news links
        required: true
        default: "10"
        type: string
      exposure_max:
        description: Maximum number of exposure and dark-web signals
        required: true
        default: "20"
        type: string

permissions:
  contents: read

concurrency:
  group: daily-security-brief
  cancel-in-progress: false

jobs:
  send-advisory:
    name: Generate and email daily security brief
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Load repository version
        shell: bash
        run: |
          echo "BRIEF_VERSION=$(tr -d '\r\n' < VERSION)" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --requirement requirements.txt

      - name: Run offline regression tests
        env:
          PYTHONPATH: src
        run: python -m unittest discover -s tests -v

      - name: Generate and send daily security brief
        env:
          GMAIL_USERNAME: ${{ secrets.GMAIL_USERNAME }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

          # Optional dark-web and exposure monitoring.
          HIBP_API_KEY: ${{ secrets.HIBP_API_KEY }}
          MONITORED_DOMAINS: ${{ secrets.MONITORED_DOMAINS }}
          MONITORED_BRANDS: ${{ secrets.MONITORED_BRANDS }}

          NEWS_LOOKBACK_HOURS: ${{ inputs.lookback_hours || 'auto' }}
          KEV_LOOKBACK_DAYS: ${{ inputs.kev_lookback_days || 'auto' }}
          NEWS_MAX_ITEMS: ${{ inputs.max_items || '40' }}
          EXEC_NEWS_MAX_ITEMS: ${{ inputs.discovery_max || '10' }}
          EXPOSURE_MAX_ITEMS: ${{ inputs.exposure_max || '20' }}
          EXEC_NEWS_MIN_SCORE: "24"
          UPCOMING_GOVERNANCE_DAYS: "14"
          SOURCE_WORKERS: "8"

        run: python src/send_security_advisory.py
