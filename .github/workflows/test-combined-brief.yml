name: Test combined daily security briefing

on:
  workflow_dispatch:
    inputs:
      lookback_hours:
        description: News reporting window in hours
        required: true
        default: "168"
        type: string
      kev_lookback_days:
        description: CISA KEV lookback in calendar days
        required: true
        default: "7"
        type: string
      max_items:
        description: Maximum total developments in the email
        required: true
        default: "25"
        type: string

permissions:
  contents: read

jobs:
  send-combined-brief:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --requirement requirements.txt

      - name: Send combined security briefing
        env:
          GMAIL_USERNAME: ${{ secrets.GMAIL_USERNAME }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          NEWS_LOOKBACK_HOURS: ${{ inputs.lookback_hours }}
          KEV_LOOKBACK_DAYS: ${{ inputs.kev_lookback_days }}
          NEWS_MAX_ITEMS: ${{ inputs.max_items }}
        run: python src/send_combined_brief.py
