name: Test DEFCON daily security briefing

on:
  workflow_dispatch:
    inputs:
      lookback_hours:
        description: Use auto, 36 or 72
        required: true
        default: "auto"
        type: string
      kev_lookback_days:
        description: Use auto or a number of calendar days
        required: true
        default: "auto"
        type: string
      max_items:
        description: Maximum total developments in the email
        required: true
        default: "40"
        type: string

permissions:
  contents: read

jobs:
  send-combined-brief:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --requirement requirements.txt

      - name: Send DEFCON security briefing
        env:
          GMAIL_USERNAME: ${{ secrets.GMAIL_USERNAME }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
          NEWS_LOOKBACK_HOURS: ${{ inputs.lookback_hours }}
          KEV_LOOKBACK_DAYS: ${{ inputs.kev_lookback_days }}
          NEWS_MAX_ITEMS: ${{ inputs.max_items }}
          UPCOMING_GOVERNANCE_DAYS: "14"
        run: python src/send_combined_brief.py
